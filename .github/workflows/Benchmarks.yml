name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Clapeyron.jl ref to benchmark (branch, tag, or commit SHA)"
        required: false
        default: "master"
      backfill:
        description: "Backfill historical benchmark data"
        required: true
        default: "false"
      backfill_from_tag:
        description: "Oldest Clapeyron tag to include in backfill"
        required: false
        default: "v0.6.1"
      backfill_to_tag:
        description: "Newest Clapeyron tag to include in backfill"
        required: false
        default: "v0.6.25"
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: benchledger-pages
  cancel-in-progress: false

env:
  BENCHLEDGER_VERSION: "0.4.1"
  BENCH_PACKAGE_NAME: "Clapeyron.jl"
  BENCH_PACKAGE_DESCRIPTION: "Benchmark history for Clapeyron.jl"
  BENCH_PACKAGE_URL: "https://github.com/ClapeyronThermo/Clapeyron.jl"
  TARGET_REPOSITORY: "ClapeyronThermo/Clapeyron.jl"
  BACKFILL_FROM_TAG: "v0.6.1"
  BACKFILL_TO_TAG: "v0.6.25"

jobs:
  build-and-publish:
    if: github.event_name != 'workflow_dispatch' || inputs.backfill != 'true'
    name: Ubuntu 24.04 - x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Pages worktree
        run: |
          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          mkdir -p gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            git -C gh-pages init
            git -C gh-pages remote add origin "$REPO_URL"
            git -C gh-pages fetch --depth=1 origin gh-pages
            git -C gh-pages checkout -B gh-pages FETCH_HEAD
          else
            git -C gh-pages init
            git -C gh-pages remote add origin "$REPO_URL"
            git -C gh-pages checkout --orphan gh-pages
          fi

      - name: Check out Clapeyron target
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || 'master' }}
          path: target/Clapeyron.jl
          fetch-depth: 0

      - name: Resolve target metadata
        id: target
        run: |
          set -euo pipefail

          TARGET_DIR="${{ github.workspace }}/target/Clapeyron.jl"
          requested_ref="${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || 'master' }}"
          commit="$(git -C "$TARGET_DIR" rev-parse HEAD)"
          date="$(git -C "$TARGET_DIR" show -s --format=%cI HEAD)"
          tag="$(git -C "$TARGET_DIR" tag --points-at HEAD | head -n 1 || true)"
          branch=""

          # actions/checkout commonly leaves detached HEAD, so prefer the requested ref when it is a branch.
          if [ -n "$requested_ref" ] && git -C "$TARGET_DIR" show-ref --verify --quiet "refs/remotes/origin/$requested_ref"; then
            branch="$requested_ref"
          elif [ -n "$requested_ref" ] && git -C "$TARGET_DIR" show-ref --verify --quiet "refs/heads/$requested_ref"; then
            branch="$requested_ref"
          else
            branch="$(git -C "$TARGET_DIR" branch --show-current || true)"
          fi

          if [ -n "$tag" ]; then
            branch=""
          fi

          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "date=$date" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Run benchmarks into benchmark database
        env:
          BENCH_DB_IN_CURRENT_BRANCH: false
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
          BENCH_BRANCH: ${{ steps.target.outputs.branch }}
          BENCH_TAG: ${{ steps.target.outputs.tag }}
          BENCH_COMMIT: ${{ steps.target.outputs.commit }}
          BENCH_DATE: ${{ steps.target.outputs.date }}
          BENCH_NOTES: "GitHub Actions BenchLedger run"
        run: |
          export BENCH_TARGET_PATH="${{ github.workspace }}/target/Clapeyron.jl"
          test -d "$BENCH_TARGET_PATH"
          mkdir -p "$(dirname "$BENCH_DB_PATH")"
          julia --project=benchmark benchmark/runbench.jl

      - name: Checkpoint benchmark database
        env:
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
          # BENCH_DB_PATH: ${{ github.workspace }}/benchmark/benchledger.sqlite (if database is not in page deploy branch)
        run: |
          julia --project=benchmark -e 'using SQLite; db = SQLite.DB(ENV["BENCH_DB_PATH"]); SQLite.execute(db, "PRAGMA wal_checkpoint(TRUNCATE)"); close(db)'
          rm -f "${BENCH_DB_PATH}-wal" "${BENCH_DB_PATH}-shm"

      - name: Download BenchLedger web release
        run: |
          url="https://github.com/abcdvvvv/BenchLedger/releases/download/v${BENCHLEDGER_VERSION}/BenchLedger-${BENCHLEDGER_VERSION}-dist.tar.gz"
          curl -fsSL "$url" -o /tmp/benchledger-dist.tar.gz
          rm -rf /tmp/benchledger-dist
          mkdir -p /tmp/benchledger-dist
          tar -xzf /tmp/benchledger-dist.tar.gz -C /tmp/benchledger-dist

      - name: Install BenchLedger viewer
        run: |
          mkdir -p gh-pages/benchmarks/data
          find gh-pages/benchmarks -mindepth 1 -maxdepth 1 ! -name data -exec rm -rf {} +
          cp -a /tmp/benchledger-dist/. gh-pages/benchmarks/

      - name: Generate BenchLedger manifest
        run: |
          db="gh-pages/benchmarks/data/benchledger.sqlite"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          sha256="$(sha256sum "$db" | cut -d' ' -f1)"
          size_bytes="$(stat -c '%s' "$db")"

          cat > gh-pages/benchmarks/benchledger.json <<EOF
          {
            "manifest_version": 1,
            "benchledger_web_version": "${BENCHLEDGER_VERSION}",
            "generated_at": "${generated_at}",
            "site": {
              "title": "${BENCH_PACKAGE_NAME} BenchLedger",
              "description": "${BENCH_PACKAGE_DESCRIPTION}"
            },
            "databases": [
              {
                "id": "${BENCH_PACKAGE_NAME}",
                "name": "${BENCH_PACKAGE_NAME}",
                "description": "${BENCH_PACKAGE_DESCRIPTION}",
                "url": "./data/benchledger.sqlite",
                "sha256": "${sha256}",
                "size_bytes": ${size_bytes},
                "packed_at": "${generated_at}",
                "schema_version": 3,
                "metadata_preview": {
                  "name": "${BENCH_PACKAGE_NAME}",
                  "project_url": "${BENCH_PACKAGE_URL}",
                  "logo_url": "https://github.com/ClapeyronThermo/Clapeyron.jl/blob/master/docs/src/assets/logo.ico"
                }
              }
            ]
          }
          EOF

      - name: Publish BenchLedger page
        working-directory: gh-pages
        run: |
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks .nojekyll

          if git diff --cached --quiet; then
            echo "No benchmarks page changes to publish."
          else
            git commit -m "Update BenchLedger benchmark page"
            git push origin HEAD:gh-pages
          fi

  backfill-benchmarks:
    if: github.event_name == 'workflow_dispatch' && inputs.backfill == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Pages worktree
        run: |
          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          mkdir -p gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            git -C gh-pages init
            git -C gh-pages remote add origin "$REPO_URL"
            git -C gh-pages fetch --depth=1 origin gh-pages
            git -C gh-pages checkout -B gh-pages FETCH_HEAD
          else
            git -C gh-pages init
            git -C gh-pages remote add origin "$REPO_URL"
            git -C gh-pages checkout --orphan gh-pages
          fi

      - name: Check out Clapeyron target history
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: master
          path: target/Clapeyron.jl
          fetch-depth: 0

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Backfill historical benchmark database
        run: |
          set -euo pipefail

          TARGET_DIR="${{ github.workspace }}/target/Clapeyron.jl"
          DB="${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite"
          FAILURE_LOG="${{ github.workspace }}/gh-pages/benchmarks/data/backfill-failures.txt"
          BACKFILL_FROM_TAG="${{ inputs.backfill_from_tag || env.BACKFILL_FROM_TAG }}"
          BACKFILL_TO_TAG="${{ inputs.backfill_to_tag || env.BACKFILL_TO_TAG }}"
          started=false
          success_count=0
          failure_count=0

          mkdir -p "$(dirname "$DB")"

          for tag in $(git -C "$TARGET_DIR" tag --sort=v:refname); do
            if [ "$started" = false ]; then
              if [ "$tag" = "$BACKFILL_FROM_TAG" ]; then
                started=true
              else
                continue
              fi
            fi

            echo "Backfilling benchmark for $tag"

            git -C "$TARGET_DIR" checkout --detach "$tag"

            commit="$(git -C "$TARGET_DIR" rev-parse HEAD)"
            date="$(git -C "$TARGET_DIR" show -s --format=%cI HEAD)"

            if BENCH_TARGET_PATH="$TARGET_DIR" \
              BENCH_DB_PATH="$DB" \
              BENCH_DB_IN_CURRENT_BRANCH=false \
              BENCH_BRANCH="" \
              BENCH_TAG="$tag" \
              BENCH_COMMIT="$commit" \
              BENCH_DATE="$date" \
              BENCH_NOTES="Backfilled with current benchmark suite against $tag" \
              julia --project=benchmark benchmark/runbench.jl; then
              success_count=$((success_count + 1))
              echo "Benchmark succeeded for $tag"
            else
              failure_count=$((failure_count + 1))
              echo "Benchmark failed for $tag, skipping to next tag."
              printf '%s\t%s\t%s\n' "$tag" "$commit" "$date" >> "$FAILURE_LOG"
            fi

            if [ -n "$BACKFILL_TO_TAG" ] && [ "$tag" = "$BACKFILL_TO_TAG" ]; then
              break
            fi
          done

          if [ "$started" = false ]; then
            echo "Requested backfill_from_tag '$BACKFILL_FROM_TAG' was not found in $TARGET_REPOSITORY tags." >&2
            exit 1
          fi

          if [ "$failure_count" -gt 0 ]; then
            {
              echo "## Backfill skipped failed tags"
              echo
              echo "Successful tags: $success_count"
              echo "Failed tags: $failure_count"
              echo
              echo '```'
              cat "$FAILURE_LOG"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$success_count" -eq 0 ]; then
            echo "Backfill did not produce any successful benchmark runs." >&2
            exit 1
          fi

      - name: Checkpoint partial benchmark database
        if: always()
        env:
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
        run: |
          if [ -f "$BENCH_DB_PATH" ]; then
            julia --project=benchmark -e 'using SQLite; db = SQLite.DB(ENV["BENCH_DB_PATH"]); SQLite.execute(db, "PRAGMA wal_checkpoint(TRUNCATE)"); close(db)'
            rm -f "${BENCH_DB_PATH}-wal" "${BENCH_DB_PATH}-shm"
          fi

      - name: Upload partial benchmark database
        if: always() && hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        uses: actions/upload-artifact@v4
        with:
          name: clapeyron-backfill-db-${{ github.run_id }}
          path: gh-pages/benchmarks/data/benchledger.sqlite

      - name: Upload skipped-tag log
        if: always() && hashFiles('gh-pages/benchmarks/data/backfill-failures.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: clapeyron-backfill-failures-${{ github.run_id }}
          path: gh-pages/benchmarks/data/backfill-failures.txt

      - name: Checkpoint benchmark database
        if: hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        env:
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
        run: |
          julia --project=benchmark -e 'using SQLite; db = SQLite.DB(ENV["BENCH_DB_PATH"]); SQLite.execute(db, "PRAGMA wal_checkpoint(TRUNCATE)"); close(db)'
          rm -f "${BENCH_DB_PATH}-wal" "${BENCH_DB_PATH}-shm"

      - name: Download BenchLedger web release
        if: hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        run: |
          url="https://github.com/abcdvvvv/BenchLedger/releases/download/v${BENCHLEDGER_VERSION}/BenchLedger-${BENCHLEDGER_VERSION}-dist.tar.gz"
          curl -fsSL "$url" -o /tmp/benchledger-dist.tar.gz
          rm -rf /tmp/benchledger-dist
          mkdir -p /tmp/benchledger-dist
          tar -xzf /tmp/benchledger-dist.tar.gz -C /tmp/benchledger-dist

      - name: Install BenchLedger viewer
        if: hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        run: |
          mkdir -p gh-pages/benchmarks/data
          find gh-pages/benchmarks -mindepth 1 -maxdepth 1 ! -name data -exec rm -rf {} +
          cp -a /tmp/benchledger-dist/. gh-pages/benchmarks/

      - name: Generate BenchLedger manifest
        if: hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        run: |
          db="gh-pages/benchmarks/data/benchledger.sqlite"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          sha256="$(sha256sum "$db" | cut -d' ' -f1)"
          size_bytes="$(stat -c '%s' "$db")"

          cat > gh-pages/benchmarks/benchledger.json <<EOF
          {
            "manifest_version": 1,
            "benchledger_web_version": "${BENCHLEDGER_VERSION}",
            "generated_at": "${generated_at}",
            "site": {
              "title": "${BENCH_PACKAGE_NAME} BenchLedger",
              "description": "${BENCH_PACKAGE_DESCRIPTION}"
            },
            "databases": [
              {
                "id": "${BENCH_PACKAGE_NAME}",
                "name": "${BENCH_PACKAGE_NAME}",
                "description": "${BENCH_PACKAGE_DESCRIPTION}",
                "url": "./data/benchledger.sqlite",
                "sha256": "${sha256}",
                "size_bytes": ${size_bytes},
                "packed_at": "${generated_at}",
                "schema_version": 3,
                "metadata_preview": {
                  "name": "${BENCH_PACKAGE_NAME}",
                  "project_url": "${BENCH_PACKAGE_URL}",
                  "logo_url": "https://github.com/ClapeyronThermo/Clapeyron.jl/blob/master/docs/src/assets/logo.ico"
                }
              }
            ]
          }
          EOF

      - name: Publish BenchLedger page
        if: hashFiles('gh-pages/benchmarks/data/benchledger.sqlite') != ''
        working-directory: gh-pages
        run: |
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks .nojekyll

          if git diff --cached --quiet; then
            echo "No benchmarks page changes to publish."
          else
            git commit -m "Backfill BenchLedger benchmark page"
            git push origin HEAD:gh-pages
          fi
